<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi-Mem Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥝</text></svg>">
<link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="logo">🥝</span>
      <div><h1>Kiwi-Mem</h1><div class="sub">管理面板</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-foot">
      <span id="foot-version">kiwi-mem</span>
      <a class="muted" href="https://github.com/LucieEveille/kiwi-mem" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="sb-backdrop"></div>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div class="flex center gap12">
        <button class="btn btn-icon btn-ghost menu-btn" id="menu-btn">☰</button>
        <div>
          <div class="crumb" id="page-crumb">kiwi-mem</div>
          <div class="title" id="page-title">仪表盘</div>
        </div>
      </div>
      <div class="actions">
        <span id="status-pill" class="badge badge-muted">连接中…</span>
        <button class="btn btn-icon btn-ghost" id="theme-btn" title="切换主题">🌙</button>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<script type="module" src="/admin/js/app.js"></script>
</body>
</html>
